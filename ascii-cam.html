<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Cam — See Yourself in Text</title>
    <meta name="description" content="Real-time ASCII art from your webcam. Watch yourself transform into characters.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00e676, #00bcd4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-title {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.3px;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ctrl-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ctrl-select,
        .ctrl-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #ccc;
            font-size: 0.78rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .ctrl-select option {
            background: #1a1a26;
            color: #eee;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .ctrl-btn.active {
            background: rgba(0, 230, 118, 0.15);
            border-color: rgba(0, 230, 118, 0.3);
            color: #00e676;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: auto;
        }

        /* ── ASCII Output ── */
        #ascii-output {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 6px;
            line-height: 7px;
            letter-spacing: 1px;
            white-space: pre;
            text-align: center;
            user-select: all;
        }

        /* ── Hidden Video ── */
        #video {
            display: none;
        }

        /* ── Start Screen ── */
        .start-screen {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        .start-screen h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00e676, #00bcd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-screen p {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .start-btn {
            padding: 14px 36px;
            background: linear-gradient(135deg, #00e676, #00bcd4);
            border: none;
            border-radius: 14px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 230, 118, 0.3);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 16px;
            font-size: 0.85rem;
            display: none;
        }

        /* ── Color Modes ── */
        .mode-green #ascii-output {
            color: #00e676;
        }

        .mode-amber #ascii-output {
            color: #ffc107;
        }

        .mode-white #ascii-output {
            color: #e0e0e0;
        }

        .mode-matrix #ascii-output {
            color: #00ff41;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }

        .mode-rainbow #ascii-output {
            background: linear-gradient(180deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }

            .header-controls {
                justify-content: center;
            }

            #ascii-output {
                font-size: 4px;
                line-height: 5px;
                letter-spacing: 0.5px;
            }
        }
    </style>
</head>

<body class="mode-green">

    <div class="start-screen" id="start-screen">
        <div class="start-icon">🖥️</div>
        <h1>ASCII Cam</h1>
        <p>Your webcam, rendered as ASCII art in real time</p>
        <button class="start-btn" id="btn-start">Enable Camera</button>
        <div class="error-msg" id="error-msg">Camera access denied. Please allow access and try again.</div>
    </div>

    <div class="header">
        <div class="header-left">
            <div class="header-logo">▓</div>
            <span class="header-title">ASCII Cam</span>
        </div>
        <div class="header-controls">
            <div class="ctrl-group">
                <span class="ctrl-label">Charset</span>
                <select class="ctrl-select" id="charset-select">
                    <option value="standard">Standard</option>
                    <option value="blocks">Blocks</option>
                    <option value="minimal">Minimal</option>
                    <option value="binary">Binary</option>
                    <option value="braille">Braille</option>
                </select>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">Color</span>
                <select class="ctrl-select" id="color-select">
                    <option value="green">Green</option>
                    <option value="amber">Amber</option>
                    <option value="white">White</option>
                    <option value="matrix">Matrix</option>
                    <option value="rainbow">Rainbow</option>
                </select>
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label">Resolution</span>
                <select class="ctrl-select" id="res-select">
                    <option value="120">High (120)</option>
                    <option value="80" selected>Medium (80)</option>
                    <option value="50">Low (50)</option>
                </select>
            </div>
            <button class="ctrl-btn" id="btn-invert">Invert</button>
            <button class="ctrl-btn" id="btn-mirror" title="Mirror">↔ Mirror</button>
        </div>
    </div>

    <div class="main">
        <pre id="ascii-output"></pre>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="buffer-canvas" style="display:none;"></canvas>

    <script>
        const CHARSETS = {
            standard: ' .:-=+*#%@',
            blocks: ' ░▒▓█',
            minimal: ' .:oO@',
            binary: ' 01',
            braille: ' ⠁⠃⠇⠏⠟⠿⡿⣿'
        };

        let charset = CHARSETS.standard;
        let cols = 80;
        let inverted = false;
        let mirrored = true;
        let running = false;

        const video = document.getElementById('video');
        const bufferCanvas = document.getElementById('buffer-canvas');
        const bufferCtx = bufferCanvas.getContext('2d', { willReadFrequently: true });
        const output = document.getElementById('ascii-output');

        // ── Start ──
        document.getElementById('btn-start').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
                });
                video.srcObject = stream;
                await video.play();
                document.getElementById('start-screen').classList.add('hidden');
                running = true;
                render();
            } catch (err) {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        // ── Render Loop ──
        function render() {
            if (!running) return;

            const aspect = video.videoWidth / video.videoHeight;
            const charAspect = 0.5;
            const w = cols;
            const h = Math.floor(w / aspect * charAspect);

            bufferCanvas.width = w;
            bufferCanvas.height = h;

            if (mirrored) {
                bufferCtx.translate(w, 0);
                bufferCtx.scale(-1, 1);
            }

            bufferCtx.drawImage(video, 0, 0, w, h);
            bufferCtx.setTransform(1, 0, 0, 1, 0, 0);

            const imageData = bufferCtx.getImageData(0, 0, w, h);
            const pixels = imageData.data;

            let ascii = '';
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    let brightness = (pixels[i] * 0.299 + pixels[i + 1] * 0.587 + pixels[i + 2] * 0.114) / 255;
                    if (inverted) brightness = 1 - brightness;
                    const charIndex = Math.floor(brightness * (charset.length - 1));
                    ascii += charset[charIndex];
                }
                ascii += '\n';
            }

            output.textContent = ascii;
            requestAnimationFrame(render);
        }

        // ── Controls ──
        document.getElementById('charset-select').addEventListener('change', e => {
            charset = CHARSETS[e.target.value];
        });

        document.getElementById('color-select').addEventListener('change', e => {
            document.body.className = `mode-${e.target.value}`;
        });

        document.getElementById('res-select').addEventListener('change', e => {
            cols = parseInt(e.target.value);
        });

        document.getElementById('btn-invert').addEventListener('click', function () {
            inverted = !inverted;
            this.classList.toggle('active');
        });

        document.getElementById('btn-mirror').addEventListener('click', function () {
            mirrored = !mirrored;
            this.classList.toggle('active');
        });

        // Mirror starts active
        document.getElementById('btn-mirror').classList.add('active');
    </script>

</body>

</html>
