<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Dice 🎲</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a12;
            --card: #12121e;
            --brd: rgba(255, 255, 255, .06);
            --accent: #c084fc;
            --accent2: #e879f9;
            --text: #f0eef5;
            --sub: #7a7890;
            --gold: #fbbf24;
            --warm: #fef3c7
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px 60px;
            text-align: center
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .sub {
            color: var(--sub);
            font-size: .85rem;
            margin-bottom: 30px
        }

        .dice-tray {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            perspective: 800px
        }

        .die {
            width: 110px;
            height: 100px;
            background: var(--card);
            border: 2px solid var(--brd);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
            position: relative;
            user-select: none;
            text-align: center;
            padding: 8px 6px 16px;
            line-height: 1.2;
            color: var(--accent)
        }

        .die:hover {
            border-color: rgba(192, 132, 252, .3);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(192, 132, 252, .1)
        }

        .die.rolling {
            animation: diceRoll .6s ease
        }

        .die .die-label {
            position: absolute;
            bottom: 4px;
            font-size: .45rem;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: .5px;
            font-weight: 600
        }

        @keyframes diceRoll {
            0% {
                transform: rotateX(0) rotateY(0) scale(1)
            }

            25% {
                transform: rotateX(180deg) rotateY(90deg) scale(.8)
            }

            50% {
                transform: rotateX(360deg) rotateY(180deg) scale(.9)
            }

            75% {
                transform: rotateX(540deg) rotateY(270deg) scale(.85)
            }

            100% {
                transform: rotateX(720deg) rotateY(360deg) scale(1)
            }
        }

        .controls {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap
        }

        .btn {
            padding: 10px 24px;
            border-radius: 12px;
            border: 1px solid var(--brd);
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px
        }

        .btn:hover {
            background: rgba(255, 255, 255, .05);
            transform: translateY(-1px)
        }

        .btn-accent {
            background: linear-gradient(135deg, rgba(192, 132, 252, .15), rgba(232, 121, 249, .15));
            border-color: rgba(192, 132, 252, .3);
            color: var(--accent)
        }

        .btn-accent:hover {
            background: linear-gradient(135deg, rgba(192, 132, 252, .25), rgba(232, 121, 249, .25))
        }

        .btn-gold {
            background: rgba(251, 191, 36, .1);
            border-color: rgba(251, 191, 36, .25);
            color: var(--gold)
        }

        .dice-count {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            align-items: center
        }

        .dice-count span {
            color: var(--sub);
            font-size: .75rem
        }

        .count-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--brd);
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s
        }

        .count-btn:hover {
            background: rgba(255, 255, 255, .05)
        }

        .count-num {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            min-width: 30px;
            text-align: center
        }

        .story-box {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 16px;
            padding: 30px;
            text-align: left;
            position: relative;
            overflow: hidden;
            min-height: 120px
        }

        .story-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold))
        }

        .story-title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 12px;
            font-style: italic
        }

        .story-text {
            font-family: 'Crimson Pro', serif;
            font-size: 1.15rem;
            line-height: 1.8;
            color: rgba(240, 238, 245, .85)
        }

        .story-text .highlight {
            color: var(--accent);
            font-weight: 600;
            font-style: italic
        }

        .story-meta {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--brd);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .65rem;
            color: var(--sub)
        }

        .genre-sel {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap
        }

        .genre-btn {
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid var(--brd);
            background: var(--card);
            color: var(--sub);
            font-family: inherit;
            font-size: .7rem;
            cursor: pointer;
            transition: all .2s
        }

        .genre-btn.active {
            background: rgba(192, 132, 252, .12);
            border-color: rgba(192, 132, 252, .25);
            color: var(--accent)
        }

        .history {
            margin-top: 30px;
            text-align: left
        }

        .history h3 {
            font-size: .8rem;
            color: var(--sub);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .hist-item {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all .2s
        }

        .hist-item:hover {
            border-color: rgba(192, 132, 252, .2)
        }

        .hist-dice {
            font-size: 1.2rem;
            margin-bottom: 4px
        }

        .hist-preview {
            font-family: 'Crimson Pro', serif;
            font-size: .8rem;
            color: var(--sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .placeholder {
            color: var(--sub);
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            font-style: italic;
            text-align: center;
            padding: 20px
        }
    </style>
</head>

        function getFace(cat) {

        function createDice() {
            const tray = document.getElementById('dice-tray');
            tray.innerHTML = '';
            currentDice = [];
            for (let i = 0; i < diceCount; i++) {
                const cat = CATS[i % CATS.length];
                const die = document.createElement('div');
                die.className = 'die';
                die.id = 'die-' + i;
                die.innerHTML = '?<div class="die-label">' + cat + '</div>';
                die.onclick = () => rollOne(i);
                tray.appendChild(die);
                currentDice.push({ cat, face: null });
            }
        }

            const cat = currentDice[i].cat;

            let flickers = 0;
            const flickerInterval = setInterval(() => {
                die.innerHTML = getFace(cat) + '<div class="die-label">' + cat + '</div>';
                flickers++;
                if (flickers > 8) {
                    clearInterval(flickerInterval);
                    const final = getFace(cat);
                    currentDice[i].face = final;
                    die.innerHTML = final + '<div class="die-label">' + cat + '</div>';
                    die.classList.remove('rolling');
                }
            }, 60);
        }

        function rollAll() {
            if (isRolling) return;
            isRolling = true;
            currentDice.forEach((_, i) => {
                setTimeout(() => {
                    rollOne(i, true);
                    if (i === diceCount - 1) setTimeout(() => { isRolling = false }, 600);
                }, i * 120);
            });
        }

        function changeDice(delta) {
            diceCount = Math.max(3, Math.min(9, diceCount + delta));
            document.getElementById('dice-num').textContent = diceCount;
            createDice();
        }

        // Genre selection
        document.querySelectorAll('.genre-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.genre-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                genre = b.dataset.g;
            });
        });

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)] }

        function generateStory() {
            const faces = currentDice.map(d => d.face).filter(Boolean);
            if (faces.length < 3) { alert('Roll at least 3 dice first!'); return; }

            const parts = STORY_PARTS[genre];
            let opening = pick(parts.openings);
            let middle = pick(parts.middles);
            let ending = pick(parts.endings);

            // Assign dice faces to slots
            const chars = faces.filter((_, i) => currentDice[i].cat === 'characters');
            const places = faces.filter((_, i) => currentDice[i].cat === 'places');
            const objects = faces.filter((_, i) => currentDice[i].cat === 'objects');
            const actions = faces.filter((_, i) => currentDice[i].cat === 'actions');
            const moods = faces.filter((_, i) => currentDice[i].cat === 'moods');

            // Fallback: just use any faces
            const all = [...faces];
            const g = (arr, fallback) => arr.length > 0 ? pick(arr) : pick(fallback || all);

            const replacements = {
                '{char}': g(chars, all), '{char2}': g(chars, all),
                '{place}': g(places, all), '{place2}': g(places, all), '{place3}': g(places, all),
                '{obj}': g(objects, all), '{obj2}': g(objects, all),
                '{action}': g(actions, all), '{action2}': g(actions, all), '{action3}': g(actions, all),
                '{mood}': g(moods, all), '{mood2}': g(moods, all), '{mood3}': g(moods, all)
            };

            let story = opening + ' ' + middle + ' ' + ending;
            for (const [key, val] of Object.entries(replacements)) {
                story = story.replaceAll(key, `<span class="highlight">${val}</span>`);
            }

            const titles = {
                fantasy: ["The Lost Prophecy", "Embers of Fate", "The Enchanted Quest", "Whispers of the Arcane", "The Dragon's Bargain"],
                scifi: ["Signal Lost", "The Last Transmission", "Beyond the Void", "Quantum Collapse", "Stellar Remains"],
                horror: ["Don't Look Back", "The Whispering Walls", "Something Beneath", "It Remembers", "The Last Recording"],
                romance: ["Written in Stars", "The Second Chance", "Hearts Unspoken", "Love in Ruins", "The Letter"],
                comedy: ["Well, That Happened", "The Absolute Disaster", "How I Got Banned", "Oops: A Memoir", "The Worst Plan Ever"],
                mystery: ["Cold Case File #7", "The Missing Piece", "Shadows Don't Lie", "The Silent Witness", "Exhibit A"],
                western: ["Dust and Thunder", "The Last Showdown", "Sundown Reckoning", "No Law Out Here", "The Drifter's Gamble"]
            };

            const title = pick(titles[genre]);
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('story-content').style.display = 'block';
            document.getElementById('story-title').textContent = '✦ ' + title;

            // Typewriter effect
            const textEl = document.getElementById('story-text');
            textEl.innerHTML = '';
            let charIdx = 0;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = story;
            const plainText = tempDiv.textContent;

            // Just set it directly with HTML for highlights
            textEl.innerHTML = story;
            textEl.style.opacity = '0';
            textEl.style.transform = 'translateY(10px)';
            setTimeout(() => {
                textEl.style.transition = 'all 0.5s ease';
                textEl.style.opacity = '1';
                textEl.style.transform = 'translateY(0)';
            }, 50);

            const genreLabels = { fantasy: '🧙 Fantasy', scifi: '🚀 Sci-Fi', horror: '👻 Horror', romance: '💕 Romance', comedy: '😂 Comedy', mystery: '🔍 Mystery', western: '🤠 Western' };
            document.getElementById('story-genre').textContent = genreLabels[genre];
            document.getElementById('story-words').textContent = plainText.split(' ').length + ' words';

            // Save to history
            storyHistory.unshift({ dice: faces.join(''), title, preview: plainText.substring(0, 80), genre, full: story });
            if (storyHistory.length > 10) storyHistory.pop();
            renderHistory();
        }

        function renderHistory() {
            if (storyHistory.length === 0) return;
            document.getElementById('history-section').style.display = 'block';
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            storyHistory.forEach((h, i) => {
                const div = document.createElement('div');
                div.className = 'hist-item';
                div.innerHTML = `<div class="hist-dice">${h.dice}</div><div class="hist-preview">${h.title} — ${h.preview}...</div>`;
                div.onclick = () => {
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('story-content').style.display = 'block';
                    document.getElementById('story-title').textContent = '✦ ' + h.title;
                    document.getElementById('story-text').innerHTML = h.full;
                    const gl = { fantasy: '🧙 Fantasy', scifi: '🚀 Sci-Fi', horror: '👻 Horror', romance: '💕 Romance', comedy: '😂 Comedy', mystery: '🔍 Mystery', western: '🤠 Western' };
                    document.getElementById('story-genre').textContent = gl[h.genre];
                };
                list.appendChild(div);
            });
        }

        function resetAll() {
            createDice();
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('story-content').style.display = 'none';
        }

        createDice();
    </script>
</body>

</html>
