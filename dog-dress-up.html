<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Dress Up! 🐶</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #fef3c7, #fde68a 30%, #fed7aa 60%, #fecaca);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #78350f;
            margin-top: 20px;
            text-align: center
        }

        h1 span {
            color: #ea580c
        }

        .subtitle {
            color: #a16207;
            font-size: .85rem;
            font-weight: 400;
            margin-bottom: 16px
        }

        .main {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 950px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center
        }

        /* Stage */
        .stage {
            position: relative;
            width: 360px;
            height: 440px;
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 50%, #86efac 70%, #4ade80);
            border-radius: 24px;
            border: 3px solid rgba(0, 0, 0, .06);
            overflow: hidden;
            flex-shrink: 0
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            opacity: .6
        }

        .c1 {
            width: 70px;
            height: 22px;
            top: 20px;
            left: 15px;
            animation: drift 18s linear infinite
        }

        .c2 {
            width: 50px;
            height: 16px;
            top: 45px;
            right: 25px;
            animation: drift 22s linear infinite reverse
        }

        .c3 {
            width: 40px;
            height: 14px;
            top: 65px;
            left: 40%;
            animation: drift 25s linear infinite
        }

        @keyframes drift {

            0%,
            100% {
                transform: translateX(0)
            }

            50% {
                transform: translateX(15px)
            }
        }

        .sun {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(251, 191, 36, .4)
        }

        /* Dog */
        .dog {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 240px
        }

        .dog-body {
            position: absolute;
            bottom: 0;
            left: 18px;
            width: 144px;
            height: 115px;
            background: var(--fur, #d4a574);
            border-radius: 72px 72px 28px 28px
        }

        .dog-belly {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 25px;
            background: var(--fur-light, #e8c9a0);
            border-radius: 35px 35px 12px 12px
        }

        .dog-head {
            position: absolute;
            bottom: 95px;
            left: 20px;
            width: 140px;
            height: 115px;
            background: var(--fur, #d4a574);
            border-radius: 70px 70px 45px 45px;
            z-index: 3
        }

        .dog-face {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 52px;
            background: var(--fur-light, #e8c9a0);
            border-radius: 38px 38px 28px 28px
        }

        .dog-eye {
            position: absolute;
            width: 18px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
            top: 32px;
            z-index: 1
        }

        .dog-eye::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 4px
        }

        .dog-eye.L {
            left: 30px
        }

        .dog-eye.R {
            right: 30px
        }

        .dog-brow {
            position: absolute;
            width: 22px;
            height: 3px;
            background: var(--fur-dark, #b8885c);
            border-radius: 2px;
            top: 26px
        }

        .dog-brow.L {
            left: 28px;
            transform: rotate(-8deg)
        }

        .dog-brow.R {
            right: 28px;
            transform: rotate(8deg)
        }

        .dog-nose {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 16px;
            background: #292524;
            border-radius: 11px 11px 9px 9px;
            z-index: 1
        }

        .dog-nose::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 4px;
            background: rgba(255, 255, 255, .2);
            border-radius: 4px;
            top: 3px;
            left: 50%;
            transform: translateX(-50%)
        }

        .dog-mouth {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 6px;
            border-bottom: 2.5px solid #a0845c;
            border-radius: 0 0 10px 10px
        }

        .dog-tongue {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 0;
            background: #f472b6;
            border-radius: 0 0 7px 7px;
            transition: height .3s;
            overflow: hidden
        }

        .dog-tongue.show {
            height: 18px;
            animation: pant .8s infinite
        }

        @keyframes pant {

            0%,
            100% {
                height: 18px
            }

            50% {
                height: 22px
            }
        }

        .dog-ear {
            position: absolute;
            width: 42px;
            height: 58px;
            background: var(--fur-dark, #b8885c);
            border-radius: 21px 21px 16px 16px;
            top: 8px;
            z-index: 2
        }

        .dog-ear.L {
            left: 4px;
            transform: rotate(-18deg)
        }

        .dog-ear.R {
            right: 4px;
            transform: rotate(18deg)
        }

        .dog-leg {
            position: absolute;
            bottom: -18px;
            width: 32px;
            height: 28px;
            background: var(--fur, #d4a574);
            border-radius: 6px 6px 14px 14px;
            z-index: 1
        }

        .dog-paw {
            position: absolute;
            bottom: 0;
            width: 34px;
            height: 10px;
            background: var(--fur-dark, #b8885c);
            border-radius: 0 0 14px 14px;
            left: -1px
        }

        .dog-leg.fl {
            left: 20px
        }

        .dog-leg.fr {
            left: 54px
        }

        .dog-leg.bl {
            right: 30px
        }

        .dog-leg.br {
            right: 10px
        }

        .dog-tail {
            position: absolute;
            bottom: 70px;
            right: -10px;
            width: 40px;
            height: 18px;
            background: var(--fur-dark, #b8885c);
            border-radius: 20px 20px 4px 10px;
            transform-origin: left center;
            transform: rotate(-20deg);
            animation: wag .4s ease-in-out infinite alternate;
            z-index: 0
        }

        @keyframes wag {
            from {
                transform: rotate(-30deg)
            }

            to {
                transform: rotate(-5deg)
            }
        }

        /* Accessory slots */
        .slot {
            position: absolute;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .slot-hat {
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
            z-index: 5
        }

        .slot-glasses {
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 40px;
            z-index: 6
        }

        .slot-collar {
            bottom: 78px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            z-index: 4
        }

        .slot-outfit {
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 100px;
            z-index: 1
        }

        .slot-cape {
            bottom: 30px;
            right: -5px;
            width: 70px;
            height: 90px;
            z-index: 0
        }

        .slot-held {
            bottom: -5px;
            left: 8px;
            width: 40px;
            height: 50px;
            z-index: 4
        }

        .slot svg {
            width: 100%;
            height: 100%
        }

        .dog-name-tag {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: #f59e0b;
            color: #fff;
            padding: 4px 14px;
            border-radius: 10px;
            font-size: .75rem;
            font-weight: 700;
            white-space: nowrap;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .1)
        }

        /* Panel */
        .panel {
            flex: 1;
            min-width: 280px;
            max-width: 420px
        }

        .name-input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, .06);
            background: rgba(255, 255, 255, .7);
            font-family: inherit;
            font-size: .9rem;
            font-weight: 600;
            color: #78350f;
            outline: none;
            margin-bottom: 10px;
            text-align: center
        }

        .name-input:focus {
            border-color: #f59e0b
        }

        .name-input::placeholder {
            color: #cba370
        }

        .breed-row {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap
        }

        .breed-btn {
            padding: 5px 12px;
            border-radius: 8px;
            border: 2px solid rgba(0, 0, 0, .04);
            background: rgba(255, 255, 255, .5);
            font-size: .72rem;
            font-weight: 600;
            color: #78350f;
            cursor: pointer;
            font-family: inherit;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .breed-btn:hover {
            background: rgba(255, 255, 255, .9)
        }

        .breed-btn.active {
            background: #f59e0b;
            color: #fff;
            border-color: #f59e0b
        }

        .breed-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, .1)
        }

        .tab-row {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            flex-wrap: wrap
        }

        .tab-btn {
            padding: 7px 14px;
            border-radius: 100px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, .5);
            font-family: inherit;
            font-size: .72rem;
            font-weight: 600;
            color: #78350f;
            cursor: pointer;
            transition: all .15s
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, .8)
        }

        .tab-btn.active {
            background: #fff;
            border-color: #f59e0b;
            color: #ea580c
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px
        }

        .item-card {
            aspect-ratio: 1;
            border-radius: 14px;
            border: 2px solid rgba(0, 0, 0, .05);
            background: rgba(255, 255, 255, .6);
            cursor: pointer;
            transition: all .15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            overflow: hidden
        }

        .item-card:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08)
        }

        .item-card.equipped {
            border-color: #f59e0b;
            background: #fffbeb;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, .15)
        }

        .item-card svg {
            width: 48px;
            height: 48px;
            flex-shrink: 0
        }

        .item-label {
            font-size: .58rem;
            color: #a16207;
            margin-top: 3px;
            text-align: center;
            line-height: 1.1;
            font-weight: 500
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px
        }

        .act-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, .05);
            background: rgba(255, 255, 255, .6);
            font-family: inherit;
            font-size: .78rem;
            font-weight: 600;
            color: #78350f;
            cursor: pointer;
            transition: all .15s
        }

        .act-btn:hover {
            background: #fff;
            transform: translateY(-1px)
        }

        .act-btn.primary {
            background: #f59e0b;
            color: #fff;
            border-color: #f59e0b
        }

        .act-btn.primary:hover {
            background: #ea580c
        }

        @media(max-width:700px) {
            .main {
                flex-direction: column;
                align-items: center
            }

            .panel {
                min-width: unset;
                width: 360px
            }
        }
    </style>
</head>

<body>
    <h1>🐶 Dog <span>Dress Up!</span></h1>
    <div class="subtitle">Pick accessories and make your pup fabulous</div>
    <div class="main">
        <div class="stage" id="stage">
            <div class="sun"></div>
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
            <div class="cloud c3"></div>
            <div class="dog" id="dog">
                <div class="dog-ear L"></div>
                <div class="dog-ear R"></div>
                <div class="slot slot-hat" id="slot-hat"></div>
                <div class="dog-head" id="dog-head">
                    <div class="dog-brow L"></div>
                    <div class="dog-brow R"></div>
                    <div class="dog-eye L"></div>
                    <div class="dog-eye R"></div>
                    <div class="dog-face"></div>
                    <div class="dog-nose"></div>
                    <div class="dog-mouth"></div>
                    <div class="dog-tongue" id="tongue"></div>
                    <div class="slot slot-glasses" id="slot-glasses"></div>
                </div>
                <div class="dog-body">
                    <div class="dog-belly"></div>
                </div>
                <div class="slot slot-collar" id="slot-collar"></div>
                <div class="slot slot-outfit" id="slot-outfit"></div>
                <div class="slot slot-cape" id="slot-cape"></div>
                <div class="slot slot-held" id="slot-held"></div>
                <div class="dog-leg fl">
                    <div class="dog-paw"></div>
                </div>
                <div class="dog-leg fr">
                    <div class="dog-paw"></div>
                </div>
                <div class="dog-leg bl">
                    <div class="dog-paw"></div>
                </div>
                <div class="dog-leg br">
                    <div class="dog-paw"></div>
                </div>
                <div class="dog-tail" id="tail"></div>
            </div>
            <div class="dog-name-tag" id="nametag">Buddy</div>
        </div>
        <div class="panel">
            <input class="name-input" id="name-input" placeholder="Name your dog..." value="Buddy" maxlength="20">
            <div class="breed-row" id="breeds"></div>
            <div class="tab-row" id="tabs"></div>
            <div class="items-grid" id="grid"></div>
            <div class="actions">
                <button class="act-btn" id="btn-clear">🗑️ Clear All</button>
                <button class="act-btn" id="btn-random">🎲 Randomize</button>
                <button class="act-btn primary" id="btn-save">📸 Save Look</button>
            </div>
        </div>
    </div>

    <script>
        // ── SVG Sprites ──
        // Each item has an SVG string, a name, and a preview SVG (for the card)
        const S = {
            // HATS
            tophat: `<svg viewBox="0 0 120 80"><rect x="20" y="40" width="80" height="38" rx="4" fill="#1a1a1a"/><rect x="10" y="72" width="100" height="8" rx="4" fill="#1a1a1a"/><rect x="30" y="50" width="60" height="6" rx="2" fill="#b45309"/></svg>`,
            crown: `<svg viewBox="0 0 120 80"><path d="M20 75 L20 35 L40 55 L60 25 L80 55 L100 35 L100 75Z" fill="#f59e0b"/><path d="M20 75 L100 75" stroke="#b45309" stroke-width="4"/><circle cx="35" cy="65" r="4" fill="#ef4444"/><circle cx="60" cy="60" r="4" fill="#3b82f6"/><circle cx="85" cy="65" r="4" fill="#22c55e"/></svg>`,
            beret: `<svg viewBox="0 0 120 80"><ellipse cx="60" cy="65" rx="50" ry="12" fill="#dc2626"/><ellipse cx="60" cy="55" rx="42" ry="20" fill="#ef4444"/><circle cx="60" cy="38" r="5" fill="#dc2626"/></svg>`,
            beanie: `<svg viewBox="0 0 120 80"><path d="M25 75 Q25 30 60 25 Q95 30 95 75" fill="#3b82f6"/><path d="M25 75 L95 75" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/><circle cx="60" cy="25" r="7" fill="#60a5fa"/><path d="M35 55 L85 55" stroke="#60a5fa" stroke-width="2" opacity=".4"/><path d="M30 65 L90 65" stroke="#60a5fa" stroke-width="2" opacity=".4"/></svg>`,
            cowboy: `<svg viewBox="0 0 120 80"><ellipse cx="60" cy="68" rx="55" ry="10" fill="#92400e"/><path d="M30 68 Q30 35 60 30 Q90 35 90 68" fill="#b45309"/><path d="M40 50 L80 50" stroke="#78350f" stroke-width="3"/></svg>`,
            wizard: `<svg viewBox="0 0 120 80"><path d="M60 0 L30 75 L90 75Z" fill="#4338ca"/><circle cx="50" cy="45" r="3" fill="#fbbf24"/><circle cx="65" cy="55" r="2.5" fill="#fbbf24"/><circle cx="55" cy="65" r="2" fill="#fbbf24"/><path d="M30 75 L90 75" stroke="#6366f1" stroke-width="4"/></svg>`,
            party: `<svg viewBox="0 0 120 80"><path d="M60 5 L40 75 L80 75Z" fill="#ec4899"/><circle cx="50" cy="35" r="3" fill="#fbbf24"/><circle cx="65" cy="50" r="2.5" fill="#22d3ee"/><circle cx="55" cy="60" r="2" fill="#4ade80"/><path d="M60 5 Q70 0 65 10" stroke="#f59e0b" stroke-width="2" fill="none"/><path d="M60 5 Q50 -2 55 12" stroke="#ec4899" stroke-width="2" fill="none"/></svg>`,
            santa: `<svg viewBox="0 0 120 80"><path d="M25 75 Q25 35 60 30 Q95 35 95 75" fill="#dc2626"/><path d="M20 72 L100 72" stroke="#fff" stroke-width="10" stroke-linecap="round"/><circle cx="75" cy="30" r="10" fill="#fff"/></svg>`,
            pirate: `<svg viewBox="0 0 120 80"><path d="M20 70 Q20 45 60 38 Q100 45 100 70" fill="#1a1a1a"/><path d="M15 70 L105 70" stroke="#1a1a1a" stroke-width="6"/><path d="M55 50 L65 50 L60 58Z" fill="#fff"/><rect x="56" y="42" width="8" height="6" rx="1" fill="#fff"/></svg>`,
            flower: `<svg viewBox="0 0 120 80"><circle cx="50" cy="50" r="10" fill="#f472b6"/><circle cx="70" cy="50" r="10" fill="#fb923c"/><circle cx="60" cy="40" r="10" fill="#fbbf24"/><circle cx="55" cy="60" r="10" fill="#a78bfa"/><circle cx="65" cy="60" r="10" fill="#4ade80"/><circle cx="60" cy="52" r="6" fill="#fef3c7"/></svg>`,
            chef: `<svg viewBox="0 0 120 80"><rect x="30" y="50" width="60" height="25" rx="2" fill="#fff"/><circle cx="45" cy="42" r="15" fill="#fff"/><circle cx="75" cy="42" r="15" fill="#fff"/><circle cx="60" cy="35" r="16" fill="#fff"/></svg>`,
            halo: `<svg viewBox="0 0 120 80"><ellipse cx="60" cy="50" rx="35" ry="10" fill="none" stroke="#fbbf24" stroke-width="5"/><ellipse cx="60" cy="50" rx="35" ry="10" fill="none" stroke="#fef3c7" stroke-width="2"/></svg>`,
            // GLASSES
            sunnies: `<svg viewBox="0 0 100 40"><circle cx="28" cy="20" r="14" fill="#1a1a1a" opacity=".8"/><circle cx="72" cy="20" r="14" fill="#1a1a1a" opacity=".8"/><path d="M42 20 L58 20" stroke="#1a1a1a" stroke-width="3"/><path d="M14 20 L5 16" stroke="#1a1a1a" stroke-width="2"/><path d="M86 20 L95 16" stroke="#1a1a1a" stroke-width="2"/></svg>`,
            round: `<svg viewBox="0 0 100 40"><circle cx="28" cy="20" r="12" fill="none" stroke="#b45309" stroke-width="3"/><circle cx="72" cy="20" r="12" fill="none" stroke="#b45309" stroke-width="3"/><path d="M40 20 L60 20" stroke="#b45309" stroke-width="2.5"/><path d="M16 20 L5 16" stroke="#b45309" stroke-width="2"/><path d="M84 20 L95 16" stroke="#b45309" stroke-width="2"/></svg>`,
            heart: `<svg viewBox="0 0 100 40"><path d="M20 22 Q20 12 28 12 Q36 12 28 26Z" fill="#ec4899"/><path d="M36 22 Q36 12 28 12 Q20 12 28 26Z" fill="#ec4899"/><path d="M64 22 Q64 12 72 12 Q80 12 72 26Z" fill="#ec4899"/><path d="M80 22 Q80 12 72 12 Q64 12 72 26Z" fill="#ec4899"/><path d="M36 18 L64 18" stroke="#ec4899" stroke-width="2.5"/></svg>`,
            star: `<svg viewBox="0 0 100 40"><polygon points="28,8 32,16 40,17 34,23 35,31 28,27 21,31 22,23 16,17 24,16" fill="#fbbf24"/><polygon points="72,8 76,16 84,17 78,23 79,31 72,27 65,31 66,23 60,17 68,16" fill="#fbbf24"/><path d="M40 19 L60 19" stroke="#fbbf24" stroke-width="2.5"/></svg>`,
            nerd: `<svg viewBox="0 0 100 40"><rect x="14" y="10" width="28" height="22" rx="4" fill="none" stroke="#1a1a1a" stroke-width="3"/><rect x="58" y="10" width="28" height="22" rx="4" fill="none" stroke="#1a1a1a" stroke-width="3"/><path d="M42 20 L58 20" stroke="#1a1a1a" stroke-width="2.5"/><line x1="14" y1="18" x2="5" y2="15" stroke="#1a1a1a" stroke-width="2"/><line x1="86" y1="18" x2="95" y2="15" stroke="#1a1a1a" stroke-width="2"/><circle cx="28" cy="21" r="2" fill="rgba(200,200,255,.3)"/><circle cx="72" cy="21" r="2" fill="rgba(200,200,255,.3)"/></svg>`,
            mono: `<svg viewBox="0 0 100 40"><circle cx="70" cy="20" r="13" fill="none" stroke="#b45309" stroke-width="3"/><line x1="70" y1="33" x2="65" y2="50" stroke="#b45309" stroke-width="2"/><circle cx="70" cy="20" r="8" fill="rgba(200,230,255,.15)"/></svg>`,
            // COLLARS
            basic: `<svg viewBox="0 0 100 30"><path d="M10 15 Q50 25 90 15" stroke="#dc2626" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="50" cy="22" r="5" fill="#fbbf24"/></svg>`,
            bowtie: `<svg viewBox="0 0 100 30"><path d="M50 15 L30 5 L30 25Z" fill="#dc2626"/><path d="M50 15 L70 5 L70 25Z" fill="#dc2626"/><circle cx="50" cy="15" r="4" fill="#b91c1c"/></svg>`,
            bandana: `<svg viewBox="0 0 100 30"><path d="M10 10 Q50 5 90 10 Q85 25 50 30 Q15 25 10 10Z" fill="#3b82f6"/><path d="M25 15 L40 15" stroke="#60a5fa" stroke-width="1.5"/><path d="M60 15 L75 15" stroke="#60a5fa" stroke-width="1.5"/></svg>`,
            pearls: `<svg viewBox="0 0 100 30"><path d="M15 12 Q50 22 85 12" stroke="none" fill="none"/><circle cx="20" cy="14" r="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/><circle cx="32" cy="17" r="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/><circle cx="44" cy="19" r="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/><circle cx="56" cy="19" r="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/><circle cx="68" cy="17" r="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/><circle cx="80" cy="14" r="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/></svg>`,
            spike: `<svg viewBox="0 0 100 30"><path d="M10 15 Q50 25 90 15" stroke="#292524" stroke-width="8" fill="none" stroke-linecap="round"/><polygon points="25,8 28,15 22,15" fill="#a8a29e"/><polygon points="40,6 43,14 37,14" fill="#a8a29e"/><polygon points="55,5 58,14 52,14" fill="#a8a29e"/><polygon points="70,6 73,14 67,14" fill="#a8a29e"/></svg>`,
            flower_col: `<svg viewBox="0 0 100 30"><path d="M10 15 Q50 25 90 15" stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round"/><circle cx="30" cy="16" r="5" fill="#f472b6"/><circle cx="50" cy="19" r="5" fill="#fbbf24"/><circle cx="70" cy="16" r="5" fill="#c084fc"/><circle cx="30" cy="16" r="2" fill="#fef3c7"/><circle cx="50" cy="19" r="2" fill="#fef3c7"/><circle cx="70" cy="16" r="2" fill="#fef3c7"/></svg>`,
            // OUTFITS
            vest: `<svg viewBox="0 0 140 100"><path d="M30 10 L20 90 L120 90 L110 10 Q70 20 30 10Z" fill="#dc2626" opacity=".8"/><path d="M65 10 L65 90" stroke="#b91c1c" stroke-width="2"/><path d="M75 10 L75 90" stroke="#b91c1c" stroke-width="2"/><circle cx="70" cy="35" r="3" fill="#fbbf24"/><circle cx="70" cy="55" r="3" fill="#fbbf24"/><circle cx="70" cy="75" r="3" fill="#fbbf24"/></svg>`,
            tuxedo: `<svg viewBox="0 0 140 100"><path d="M30 10 L20 90 L120 90 L110 10 Q70 20 30 10Z" fill="#1a1a1a" opacity=".85"/><path d="M55 10 L70 40 L85 10" fill="#fff" opacity=".9"/><rect x="65" y="40" width="10" height="8" rx="2" fill="#1a1a1a"/></svg>`,
            sweater: `<svg viewBox="0 0 140 100"><path d="M30 10 L20 90 L120 90 L110 10 Q70 20 30 10Z" fill="#7c3aed" opacity=".8"/><path d="M20 35 L120 35" stroke="#6d28d9" stroke-width="3" opacity=".5"/><path d="M20 55 L120 55" stroke="#6d28d9" stroke-width="3" opacity=".5"/><path d="M20 75 L120 75" stroke="#6d28d9" stroke-width="3" opacity=".5"/></svg>`,
            rain: `<svg viewBox="0 0 140 100"><path d="M30 10 L20 90 L120 90 L110 10 Q70 20 30 10Z" fill="#fbbf24" opacity=".85"/><circle cx="50" cy="40" r="3" fill="#f59e0b"/><circle cx="80" cy="55" r="3" fill="#f59e0b"/><circle cx="45" cy="70" r="3" fill="#f59e0b"/><circle cx="90" cy="35" r="3" fill="#f59e0b"/></svg>`,
            jersey: `<svg viewBox="0 0 140 100"><path d="M30 10 L20 90 L120 90 L110 10 Q70 20 30 10Z" fill="#2563eb" opacity=".8"/><text x="70" y="60" text-anchor="middle" fill="#fff" font-size="28" font-weight="800" font-family="sans-serif">7</text></svg>`,
            hawaiian: `<svg viewBox="0 0 140 100"><path d="M30 10 L20 90 L120 90 L110 10 Q70 20 30 10Z" fill="#22d3ee" opacity=".75"/><circle cx="45" cy="35" r="6" fill="#f472b6" opacity=".6"/><circle cx="85" cy="50" r="6" fill="#fbbf24" opacity=".6"/><circle cx="55" cy="70" r="6" fill="#f472b6" opacity=".6"/><circle cx="95" cy="75" r="5" fill="#4ade80" opacity=".6"/><circle cx="35" cy="60" r="5" fill="#fbbf24" opacity=".6"/></svg>`,
            // CAPES
            super_cape: `<svg viewBox="0 0 70 80"><path d="M10 5 Q5 40 15 75 L55 75 Q65 40 60 5Z" fill="#dc2626" opacity=".85"/><path d="M35 30 L28 45 L35 40 L42 45Z" fill="#fbbf24"/></svg>`,
            wizard_cape: `<svg viewBox="0 0 70 80"><path d="M10 5 Q5 40 15 75 L55 75 Q65 40 60 5Z" fill="#4338ca" opacity=".8"/><circle cx="25" cy="30" r="2" fill="#fbbf24" opacity=".6"/><circle cx="40" cy="45" r="1.5" fill="#fbbf24" opacity=".5"/><circle cx="30" cy="60" r="2" fill="#fbbf24" opacity=".4"/><circle cx="45" cy="25" r="1.5" fill="#fbbf24" opacity=".5"/></svg>`,
            bat: `<svg viewBox="0 0 70 80"><path d="M35 10 Q5 20 10 50 Q15 35 25 45 Q30 30 35 50 Q40 30 45 45 Q55 35 60 50 Q65 20 35 10Z" fill="#292524" opacity=".85"/></svg>`,
            angel: `<svg viewBox="0 0 70 80"><path d="M10 15 Q5 40 20 70 L50 70 Q65 40 60 15Z" fill="#fff" opacity=".7"/><path d="M10 15 Q5 40 20 70" stroke="#e2e8f0" stroke-width="1.5" fill="none"/><path d="M60 15 Q65 40 50 70" stroke="#e2e8f0" stroke-width="1.5" fill="none"/></svg>`,
            // HELD ITEMS
            bone: `<svg viewBox="0 0 50 60"><rect x="12" y="22" width="26" height="8" rx="4" fill="#e8dcc8" transform="rotate(-30 25 26)"/><circle cx="12" cy="18" r="5" fill="#e8dcc8"/><circle cx="8" cy="24" r="5" fill="#e8dcc8"/><circle cx="38" cy="28" r="5" fill="#e8dcc8"/><circle cx="42" cy="34" r="5" fill="#e8dcc8"/></svg>`,
            ball: `<svg viewBox="0 0 50 60"><circle cx="25" cy="35" r="14" fill="#22c55e"/><path d="M15 28 Q25 22 35 28" stroke="#16a34a" stroke-width="2" fill="none"/><path d="M15 42 Q25 48 35 42" stroke="#16a34a" stroke-width="2" fill="none"/></svg>`,
            rose: `<svg viewBox="0 0 50 60"><line x1="25" y1="30" x2="25" y2="55" stroke="#16a34a" stroke-width="3"/><path d="M22 42 L15 38" stroke="#16a34a" stroke-width="2"/><circle cx="25" cy="25" r="10" fill="#e11d48"/><path d="M20 22 Q25 18 30 22 Q28 26 25 24 Q22 26 20 22Z" fill="#be123c"/></svg>`,
            wand: `<svg viewBox="0 0 50 60"><line x1="25" y1="15" x2="25" y2="55" stroke="#78350f" stroke-width="4" stroke-linecap="round"/><polygon points="25,8 22,15 28,15" fill="#fbbf24"/><circle cx="25" cy="8" r="4" fill="#fbbf24"/><circle cx="20" cy="6" r="1.5" fill="#fef3c7"/><circle cx="30" cy="10" r="1" fill="#fef3c7"/></svg>`,
            sword: `<svg viewBox="0 0 50 60"><rect x="23" y="8" width="4" height="35" rx="1" fill="#9ca3af"/><rect x="16" y="40" width="18" height="5" rx="2" fill="#78350f"/><rect x="23" y="45" width="4" height="10" rx="1" fill="#92400e"/><circle cx="25" cy="8" r="2" fill="#e2e8f0"/></svg>`,
            teddy: `<svg viewBox="0 0 50 60"><circle cx="25" cy="35" r="12" fill="#b45309"/><circle cx="25" cy="25" r="9" fill="#b45309"/><circle cx="18" cy="19" r="5" fill="#92400e"/><circle cx="32" cy="19" r="5" fill="#92400e"/><circle cx="22" cy="23" r="2" fill="#1a1a1a"/><circle cx="28" cy="23" r="2" fill="#1a1a1a"/><ellipse cx="25" cy="27" rx="3" ry="2" fill="#78350f"/></svg>`,
        };

        const CATS = [
            {
                name: '🎩 Hats', slot: 'hat', items: [
                    { id: 'tophat', label: 'Top Hat' }, { id: 'crown', label: 'Crown' }, { id: 'beret', label: 'Beret' }, { id: 'beanie', label: 'Beanie' },
                    { id: 'cowboy', label: 'Cowboy' }, { id: 'wizard', label: 'Wizard' }, { id: 'party', label: 'Party' }, { id: 'santa', label: 'Santa' },
                    { id: 'pirate', label: 'Pirate' }, { id: 'flower', label: 'Flower' }, { id: 'chef', label: 'Chef' }, { id: 'halo', label: 'Halo' },
                ]
            },
            {
                name: '🕶️ Eyes', slot: 'glasses', items: [
                    { id: 'sunnies', label: 'Shades' }, { id: 'round', label: 'Round' }, { id: 'heart', label: 'Hearts' }, { id: 'star', label: 'Stars' },
                    { id: 'nerd', label: 'Nerdy' }, { id: 'mono', label: 'Monocle' },
                ]
            },
            {
                name: '📿 Collar', slot: 'collar', items: [
                    { id: 'basic', label: 'Classic' }, { id: 'bowtie', label: 'Bow Tie' }, { id: 'bandana', label: 'Bandana' }, { id: 'pearls', label: 'Pearls' },
                    { id: 'spike', label: 'Spiky' }, { id: 'flower_col', label: 'Flowers' },
                ]
            },
            {
                name: '👕 Outfit', slot: 'outfit', items: [
                    { id: 'vest', label: 'Vest' }, { id: 'tuxedo', label: 'Tuxedo' }, { id: 'sweater', label: 'Sweater' }, { id: 'rain', label: 'Raincoat' },
                    { id: 'jersey', label: 'Jersey' }, { id: 'hawaiian', label: 'Hawaiian' },
                ]
            },
            {
                name: '🦸 Cape', slot: 'cape', items: [
                    { id: 'super_cape', label: 'Super' }, { id: 'wizard_cape', label: 'Wizard' }, { id: 'bat', label: 'Bat Wings' }, { id: 'angel', label: 'Angel' },
                ]
            },
            {
                name: '🦴 Held', slot: 'held', items: [
                    { id: 'bone', label: 'Bone' }, { id: 'ball', label: 'Ball' }, { id: 'rose', label: 'Rose' }, { id: 'wand', label: 'Wand' },
                    { id: 'sword', label: 'Sword' }, { id: 'teddy', label: 'Teddy' },
                ]
            },
        ];

        const BREEDS = [
            { name: 'Golden', color: '#d4a574', light: '#e8c9a0', dark: '#b8885c' },
            { name: 'White', color: '#f5f5f4', light: '#ffffff', dark: '#d6d3d1' },
            { name: 'Black', color: '#292524', light: '#44403c', dark: '#1c1917' },
            { name: 'Brown', color: '#9a7b4f', light: '#b8945e', dark: '#7a5c38' },
            { name: 'Gray', color: '#a1a1aa', light: '#d4d4d8', dark: '#71717a' },
            { name: 'Spotted', color: '#f5f5f4', light: '#ffffff', dark: '#d6d3d1', spots: true },
        ];

        let equipped = { hat: null, glasses: null, collar: null, outfit: null, cape: null, held: null };
        let curTab = 0, curBreed = 0;

        // Build breeds
        const breedsEl = document.getElementById('breeds');
        BREEDS.forEach((b, i) => {
            const btn = document.createElement('button'); btn.className = 'breed-btn' + (i === 0 ? ' active' : '');
            btn.innerHTML = `<span class="breed-swatch" style="background:${b.color}"></span>${b.name}`;
            btn.addEventListener('click', () => { curBreed = i; document.querySelectorAll('.breed-btn').forEach(x => x.classList.remove('active')); btn.classList.add('active'); applyBreed() });
            breedsEl.appendChild(btn);
        });

        function applyBreed() {
            const b = BREEDS[curBreed];
            document.documentElement.style.setProperty('--fur', b.color);
            document.documentElement.style.setProperty('--fur-light', b.light);
            document.documentElement.style.setProperty('--fur-dark', b.dark);
        }

        // Build tabs
        const tabsEl = document.getElementById('tabs');
        CATS.forEach((c, i) => {
            const btn = document.createElement('button'); btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
            btn.textContent = c.name;
            btn.addEventListener('click', () => { curTab = i; document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); btn.classList.add('active'); renderGrid() });
            tabsEl.appendChild(btn);
        });

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            const cat = CATS[curTab];
            cat.items.forEach(item => {
                const card = document.createElement('div'); card.className = 'item-card';
                if (equipped[cat.slot] === item.id) card.classList.add('equipped');
                card.innerHTML = S[item.id] + `<span class="item-label">${item.label}</span>`;
                card.addEventListener('click', () => {
                    equipped[cat.slot] = equipped[cat.slot] === item.id ? null : item.id;
                    renderGrid(); renderDog();
                });
                g.appendChild(card);
            });
        }

        function renderDog() {
            CATS.forEach(cat => {
                const el = document.getElementById('slot-' + cat.slot);
                if (equipped[cat.slot]) { el.innerHTML = S[equipped[cat.slot]] }
                else { el.innerHTML = '' }
            });
            const has = Object.values(equipped).some(v => v !== null);
            document.getElementById('tongue').classList.toggle('show', has);
            const cnt = Object.values(equipped).filter(v => v !== null).length;
            document.getElementById('tail').style.animationDuration = Math.max(.15, .5 - .05 * cnt) + 's';
        }

        // Name
        document.getElementById('name-input').addEventListener('input', function () { document.getElementById('nametag').textContent = this.value || '???' });

        // Clear
        document.getElementById('btn-clear').addEventListener('click', () => { Object.keys(equipped).forEach(k => equipped[k] = null); renderGrid(); renderDog() });

        // Random
        const NAMES = ['Sir Barkington', 'Princess Woofs', 'Captain Snoot', 'Lord Fluffbutt', 'Agent Pawsome', 'Dr. Boop', 'Count Droolcula', 'The Notorious D.O.G.', 'Bark Obama', 'Chewbarka', 'Indiana Bones', 'Mary Puppins', 'Woofgang Puck', 'Dogtor Strange'];
        document.getElementById('btn-random').addEventListener('click', () => {
            CATS.forEach(cat => {
                if (Math.random() < .55) equipped[cat.slot] = cat.items[Math.floor(Math.random() * cat.items.length)].id;
                else equipped[cat.slot] = null;
            });
            curBreed = Math.floor(Math.random() * BREEDS.length);
            document.querySelectorAll('.breed-btn').forEach((b, i) => { b.classList.toggle('active', i === curBreed) }); applyBreed();
            const n = NAMES[Math.floor(Math.random() * NAMES.length)];
            document.getElementById('name-input').value = n; document.getElementById('nametag').textContent = n;
            renderGrid(); renderDog();
        });

        // Save
        document.getElementById('btn-save').addEventListener('click', () => { alert('📸 Your pup looks amazing! Use your browser screenshot tool or right-click to save!') });

        renderGrid(); renderDog(); applyBreed();
    </script>
</body>

</html>
