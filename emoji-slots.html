<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Slots 🎰</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff
        }

        .machine {
            background: linear-gradient(145deg, #2d1b4e, #1a1030);
            border: 3px solid rgba(255, 187, 36, .3);
            border-radius: 24px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 0 60px rgba(139, 92, 246, .15), inset 0 0 30px rgba(0, 0, 0, .3);
            position: relative
        }

        .machine::before {
            content: '🎰';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0 4px
        }

        .sub {
            text-align: center;
            color: rgba(255, 255, 255, .3);
            font-size: .65rem;
            margin-bottom: 16px
        }

        .window {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
            padding: 16px;
            background: rgba(0, 0, 0, .4);
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, .05)
        }

        .reel {
            width: 80px;
            height: 90px;
            background: rgba(0, 0, 0, .3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border: 2px solid rgba(255, 255, 255, .08);
            position: relative;
            overflow: hidden
        }

        .reel.spinning .emoji {
            animation: spin-reel .1s linear infinite
        }

        @keyframes spin-reel {
            0% {
                transform: translateY(-100%);
                opacity: 0
            }

            50% {
                transform: translateY(0);
                opacity: 1
            }

            100% {
                transform: translateY(100%);
                opacity: 0
            }
        }

        .pull-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .pull-btn:hover {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(245, 158, 11, .3)
        }

        .pull-btn:active {
            transform: translateY(0)
        }

        .pull-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            font-size: .7rem;
            color: rgba(255, 255, 255, .4)
        }

        .stats span {
            color: #fbbf24;
            font-weight: 700
        }

        .result {
            text-align: center;
            min-height: 60px;
            padding: 8px;
            font-size: .85rem
        }

        .result .prize {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fbbf24;
            margin-top: 4px
        }

        .result .lose {
            color: rgba(255, 255, 255, .3)
        }

        .jackpot {
            animation: jackpot 1s ease infinite
        }

        @keyframes jackpot {

            0%,
            100% {
                text-shadow: 0 0 10px rgba(251, 191, 36, .5)
            }

            50% {
                text-shadow: 0 0 30px rgba(251, 191, 36, .8)
            }
        }

        .history {
            margin-top: 12px;
            max-height: 100px;
            overflow-y: auto;
            font-size: .6rem;
            color: rgba(255, 255, 255, .25);
            padding: 8px;
            background: rgba(0, 0, 0, .2);
            border-radius: 8px
        }

        .history div {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .03)
        }

        .coin {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            animation: coin-fall 1.5s ease-in forwards
        }

        @keyframes coin-fall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0)
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg)
            }
        }

        .lights {
            position: absolute;
            top: -2px;
            left: 10%;
            right: 10%;
            height: 4px;
            display: flex;
            gap: 8px;
            justify-content: center
        }

        .light {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: blink .5s ease-in-out infinite alternate
        }

        .light:nth-child(odd) {
            animation-delay: .25s
        }

        @keyframes blink {
            from {
                opacity: .3
            }

            to {
                opacity: 1
            }
        }
    </style>
</head>

<body>
    <div class="machine">
        <div class="lights" id="lights"></div>
        <h1>EMOJI SLOTS</h1>
        <div class="sub">match 3 to win absolutely nothing of value</div>
        <div class="window">
            <div class="reel" id="r0"><span class="emoji">🎲</span></div>
            <div class="reel" id="r1"><span class="emoji">🎲</span></div>
            <div class="reel" id="r2"><span class="emoji">🎲</span></div>
        </div>
        <button class="pull-btn" id="pull">🎰 PULL THE LEVER</button>
        <div class="stats">
            Spins: <span id="spins">0</span> | Wins: <span id="wins">0</span> | Best: <span id="best">---</span>
        </div>
        <div class="result" id="result">Feeling lucky? Pull the lever!</div>
        <div class="history" id="history"></div>
    </div>

    <script>
        const symbols = ['🍒', '🍋', '🍊', '🍇', '🔔', '💎', '7️⃣', '🍀', '⭐', '🎪', '🌈', '👑', '🦄', '🎭', '🐉'];
        const reels = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2')];
        const pullBtn = document.getElementById('pull');
        const resultEl = document.getElementById('result');
        let spins = 0, wins = 0, spinning = false;
        const historyEl = document.getElementById('history');

        // Lights
        const lightsEl = document.getElementById('lights');
        const lColors = ['#ef4444', '#f59e0b', '#22c55e', '#3b82f6', '#ec4899', '#8b5cf6'];
        for (let i = 0; i < 12; i++) {
            const l = document.createElement('div');
            l.className = 'light';
            l.style.background = lColors[i % lColors.length];
            lightsEl.appendChild(l);
        }

        const prizes = {
            '🍒🍒🍒': { name: 'Cherry Bomb!', reward: '🍒 Three cherries! You win a stomach ache!' },
            '💎💎💎': { name: 'DIAMOND JACKPOT!', reward: '💎 You are now theoretically rich!' },
            '7️⃣7️⃣7️⃣': { name: 'TRIPLE SEVEN!', reward: '7️⃣ The luckiest combo! Nothing happens!' },
            '🍀🍀🍀': { name: 'LUCKY CLOVER!', reward: '🍀 Incredible luck! Still no real prize though!' },
            '👑👑👑': { name: 'ROYAL FLUSH!', reward: '👑 You are now King/Queen of slot machines!' },
            '🐉🐉🐉': { name: 'DRAGON JACKPOT!', reward: '🐉 Three dragons! Fear you!' },
            '🦄🦄🦄': { name: 'MYTHICAL WIN!', reward: '🦄 Rarer than rare! Mythologically impossible!' },
        };

        const twoMatch = [
            "Two out of three! So close! (Not really.)",
            "Almost! The third reel betrayed you.",
            "2/3 ain't bad! (Yes it is.)",
            "Ooh, two matching! That's worth... nothing.",
            "The universe teased you with two matches.",
        ];

        const noMatch = [
            "Better luck next time! (There is no luck.)",
            "The reels have spoken. They said 'no.'",
            "Wow, nothing matched. Not even close.",
            "Statistical analysis: you lost.",
            "The slot machine laughs in emoji.",
            "Have you tried being luckier?",
            "Fun fact: the odds are made up!",
            "At least you're having fun... right?",
        ];

        pullBtn.addEventListener('click', () => {
            if (spinning) return;
            spinning = true;
            pullBtn.disabled = true;
            spins++;
            document.getElementById('spins').textContent = spins;

            // Start spinning animation
            reels.forEach(r => r.classList.add('spinning'));

            // Pick results
            const results = [0, 1, 2].map(() => symbols[Math.floor(Math.random() * symbols.length)]);

            // Stop reels one by one
            reels.forEach((reel, i) => {
                setTimeout(() => {
                    reel.classList.remove('spinning');
                    reel.querySelector('.emoji').textContent = results[i];

                    if (i === 2) {
                        // All stopped, check result
                        setTimeout(() => checkResult(results), 200);
                    }
                }, 500 + i * 400);
            });
        });

        function checkResult(results) {
            const key = results.join('');
            const allSame = results[0] === results[1] && results[1] === results[2];
            const twoSame = results[0] === results[1] || results[1] === results[2] || results[0] === results[2];

            if (allSame) {
                wins++;
                document.getElementById('wins').textContent = wins;
                const prize = prizes[key] || { name: 'TRIPLE MATCH!', reward: `${results[0]} Three of a kind! You win bragging rights!` };
                resultEl.innerHTML = `<div class="prize jackpot">${prize.name}</div><div style="color:rgba(255,255,255,.5);font-size:.75rem;margin-top:4px">${prize.reward}</div>`;
                document.getElementById('best').textContent = prize.name;

                // Coin rain!
                for (let i = 0; i < 20; i++) {
                    const c = document.createElement('div');
                    c.className = 'coin';
                    c.textContent = '🪙';
                    c.style.left = Math.random() * 100 + '%';
                    c.style.top = '-20px';
                    c.style.fontSize = (1 + Math.random()) + 'rem';
                    c.style.animationDelay = (Math.random() * .5) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 2000);
                }
            } else if (twoSame) {
                resultEl.innerHTML = `<div class="lose">${twoMatch[Math.floor(Math.random() * twoMatch.length)]}</div>`;
            } else {
                resultEl.innerHTML = `<div class="lose">${noMatch[Math.floor(Math.random() * noMatch.length)]}</div>`;
            }

            // History
            const entry = document.createElement('div');
            entry.textContent = `#${spins}: ${results.join(' ')} — ${allSame ? 'WIN!' : 'nope'}`;
            historyEl.prepend(entry);
            if (historyEl.children.length > 20) historyEl.lastChild.remove();

            spinning = false;
            pullBtn.disabled = false;
        }
    </script>
</body>

</html>
