<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrain Generator — Procedural Worlds</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #06080c;
            color: #eee;
            height: 100vh;
            overflow: hidden;
            display: flex
        }

        canvas {
            flex: 1;
            display: block;
            min-width: 0;
            image-rendering: pixelated
        }

        .sidebar {
            width: 220px;
            background: #0a0c12;
            border-left: 1px solid rgba(255, 255, 255, .06);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto
        }

        .sb-title {
            font-size: .62rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, .2);
            font-weight: 600;
            margin-bottom: 8px
        }

        .sb-group {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .slider-row {
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: .7rem
        }

        .slider-label span:first-child {
            color: rgba(255, 255, 255, .4)
        }

        .slider-label span:last-child {
            color: #4ade80;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            font-size: .68rem
        }

        .slider-row input {
            width: 100%;
            -webkit-appearance: none;
            height: 3px;
            background: rgba(255, 255, 255, .08);
            border-radius: 2px;
            outline: none
        }

        .slider-row input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer
        }

        .btn {
            padding: 8px 14px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 8px;
            color: #aaa;
            font-size: .78rem;
            font-family: inherit;
            cursor: pointer;
            transition: all .15s;
            text-align: center
        }

        .btn:hover {
            background: rgba(255, 255, 255, .1);
            color: #fff
        }

        .btn.accent {
            background: rgba(74, 222, 128, .12);
            border-color: rgba(74, 222, 128, .2);
            color: #4ade80
        }

        .biome-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap
        }

        .biome-btn {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .03);
            font-size: .68rem;
            color: rgba(255, 255, 255, .4);
            cursor: pointer;
            transition: all .15s;
            font-family: inherit
        }

        .biome-btn:hover {
            background: rgba(255, 255, 255, .08)
        }

        .biome-btn.active {
            border-color: rgba(74, 222, 128, .3);
            color: #4ade80;
            background: rgba(74, 222, 128, .08)
        }

        .logo {
            font-weight: 700;
            font-size: .9rem;
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px
        }

        .seed-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            color: rgba(255, 255, 255, .2);
            padding: 6px 10px;
            background: rgba(255, 255, 255, .03);
            border-radius: 6px;
            text-align: center
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div class="sidebar">
        <div>
            <div class="logo">🌎 Terrain Generator</div>
            <div class="seed-display" id="seed-display">Seed: 0</div>
        </div>
        <div class="sb-group">
            <div class="sb-title">Terrain</div>
            <div class="slider-row">
                <div class="slider-label"><span>Scale</span><span id="v-scale">50</span></div><input type="range"
                    id="s-scale" min="10" max="200" value="50">
            </div>
            <div class="slider-row">
                <div class="slider-label"><span>Octaves</span><span id="v-octaves">6</span></div><input type="range"
                    id="s-octaves" min="1" max="10" value="6">
            </div>
            <div class="slider-row">
                <div class="slider-label"><span>Persistence</span><span id="v-persist">0.5</span></div><input
                    type="range" id="s-persist" min="20" max="80" value="50">
            </div>
            <div class="slider-row">
                <div class="slider-label"><span>Sea Level</span><span id="v-sea">0.38</span></div><input type="range"
                    id="s-sea" min="0" max="100" value="38">
            </div>
        </div>
        <div class="sb-group">
            <div class="sb-title">Biome</div>
            <div class="biome-row">
                <button class="biome-btn active" data-biome="earth">🌍 Earth</button>
                <button class="biome-btn" data-biome="alien">👽 Alien</button>
                <button class="biome-btn" data-biome="ice">❄️ Ice</button>
                <button class="biome-btn" data-biome="desert">🏜️ Desert</button>
                <button class="biome-btn" data-biome="lava">🌋 Lava</button>
            </div>
        </div>
        <button class="btn accent" id="btn-gen">🎲 New World</button>
        <button class="btn" id="btn-download">💾 Save PNG</button>
    </div>
    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        let W, H;
        let seed = Math.floor(Math.random() * 99999);
        let scale = 50, octaves = 6, persistence = .5, seaLevel = .38, biome = 'earth';

        // Simple noise (value noise with interpolation)
        function hash(x, y) { let n = x * 374761393 + y * 668265263 + seed; n = (n ^ (n >> 13)) * 1274126177; return (n ^ (n >> 16)) & 0x7fffffff }
        function noise2d(x, y) {
            const ix = Math.floor(x), iy = Math.floor(y);
            const fx = x - ix, fy = y - iy;
            const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
            const a = hash(ix, iy) / 0x7fffffff, b = hash(ix + 1, iy) / 0x7fffffff;
            const c = hash(ix, iy + 1) / 0x7fffffff, d = hash(ix + 1, iy + 1) / 0x7fffffff;
            return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
        }
        function fbm(x, y) {
            let val = 0, amp = 1, freq = 1, maxAmp = 0;
            for (let i = 0; i < octaves; i++) { val += noise2d(x * freq, y * freq) * amp; maxAmp += amp; amp *= persistence; freq *= 2 }
            return val / maxAmp;
        }

        const BIOMES = {
            earth: [
                [0, .33, '#1a3a5c'], [0, .38, '#2563eb'], [.38, .42, '#d4a76a'], [.42, .55, '#3d8b37'],
                [.55, .7, '#2d6b27'], [.7, .82, '#6b5b3a'], [.82, .9, '#888888'], [.9, 1, '#ffffff']
            ],
            alien: [
                [0, .33, '#2a0845'], [0, .38, '#6b21a8'], [.38, .42, '#c084fc'], [.42, .55, '#10b981'],
                [.55, .7, '#059669'], [.7, .82, '#4338ca'], [.82, .9, '#a855f7'], [.9, 1, '#f0abfc']
            ],
            ice: [
                [0, .33, '#0c4a6e'], [0, .38, '#0284c7'], [.38, .42, '#e0f2fe'], [.42, .55, '#bae6fd'],
                [.55, .7, '#7dd3fc'], [.7, .82, '#a5b4fc'], [.82, .9, '#e0e7ff'], [.9, 1, '#ffffff']
            ],
            desert: [
                [0, .2, '#78350f'], [0, .25, '#92400e'], [.25, .35, '#d4a76a'], [.35, .55, '#fbbf24'],
                [.55, .7, '#f59e0b'], [.7, .82, '#d97706'], [.82, .9, '#b45309'], [.9, 1, '#92400e']
            ],
            lava: [
                [0, .33, '#1c1917'], [0, .38, '#ef4444'], [.38, .42, '#991b1b'], [.42, .55, '#292524'],
                [.55, .7, '#44403c'], [.7, .82, '#78716c'], [.82, .9, '#f97316'], [.9, 1, '#fbbf24']
            ]
        };

        function getColor(height) {
            const palette = BIOMES[biome];
            for (let i = palette.length - 1; i >= 0; i--) {
                if (height >= palette[i][0]) return palette[i][2];
            }
            return palette[0][2];
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b];
        }

        function generate() {
            document.getElementById('seed-display').textContent = 'Seed: ' + seed;
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;
            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    let h = fbm(x / scale, y / scale);
                    // Add some variation
                    h = Math.pow(h, 1.1);
                    const color = hexToRgb(getColor(h));
                    // Shading
                    const shade = h > .38 ? (.8 + h * .3) : 1;
                    const idx = (y * W + x) * 4;
                    data[idx] = Math.min(255, color[0] * shade) | 0;
                    data[idx + 1] = Math.min(255, color[1] * shade) | 0;
                    data[idx + 2] = Math.min(255, color[2] * shade) | 0;
                    data[idx + 3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // Sliders
        ['scale', 'octaves', 'persist', 'sea'].forEach(name => {
            const el = document.getElementById('s-' + name);
            el.addEventListener('input', () => {
                if (name === 'scale') { scale = parseInt(el.value); document.getElementById('v-scale').textContent = scale }
                else if (name === 'octaves') { octaves = parseInt(el.value); document.getElementById('v-octaves').textContent = octaves }
                else if (name === 'persist') { persistence = el.value / 100; document.getElementById('v-persist').textContent = persistence.toFixed(2) }
                else if (name === 'sea') {
                    seaLevel = el.value / 100; document.getElementById('v-sea').textContent = seaLevel.toFixed(2);
                    BIOMES.earth[1][1] = seaLevel; BIOMES.earth[2][0] = seaLevel
                }
                generate();
            });
        });

        document.querySelectorAll('.biome-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.biome-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); biome = btn.dataset.biome; generate();
            })
        });

        document.getElementById('btn-gen').addEventListener('click', () => { seed = Math.floor(Math.random() * 99999); generate() });
        document.getElementById('btn-download').addEventListener('click', () => {
            const link = document.createElement('a'); link.download = `terrain-${seed}.png`; link.href = canvas.toDataURL(); link.click();
        });

        function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; generate() }
        resize(); window.addEventListener('resize', resize);
    </script>
</body>

</html>
