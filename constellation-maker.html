<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constellation Maker — Paint the Night Sky</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #02020a;
            color: #eee;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0
        }

        .hud {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .hud-card {
            background: rgba(2, 2, 10, .8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 12px;
            padding: 12px 16px
        }

        .hud-title {
            font-size: .6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, .25);
            margin-bottom: 8px;
            font-weight: 600
        }

        .tool-row {
            display: flex;
            gap: 6px
        }

        .tool-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 8px;
            color: rgba(255, 255, 255, .5);
            font-size: .72rem;
            font-family: inherit;
            cursor: pointer;
            transition: all .15s
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, .08)
        }

        .tool-btn.active {
            background: rgba(250, 204, 21, .12);
            border-color: rgba(250, 204, 21, .25);
            color: #facc15
        }

        .color-row {
            display: flex;
            gap: 4px;
            margin-top: 8px
        }

        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all .15s
        }

        .color-dot:hover {
            transform: scale(1.15)
        }

        .color-dot.active {
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255, 255, 255, .2)
        }

        .name-input {
            margin-top: 8px;
            width: 100%;
            padding: 6px 10px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: .75rem;
            outline: none
        }

        .name-input:focus {
            border-color: rgba(250, 204, 21, .3)
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, .15)
        }

        .stats {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(2, 2, 10, .7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, .04);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: .7rem;
            color: rgba(255, 255, 255, .25)
        }

        .stats strong {
            color: #facc15;
            font-weight: 600
        }

        .constellations-list {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: calc(100vh - 40px);
            overflow-y: auto
        }

        .const-tag {
            padding: 6px 12px;
            background: rgba(2, 2, 10, .7);
            border: 1px solid rgba(255, 255, 255, .04);
            border-radius: 8px;
            font-size: .7rem;
            color: rgba(255, 255, 255, .3);
            cursor: pointer;
            transition: all .15s
        }

        .const-tag:hover {
            background: rgba(255, 255, 255, .06);
            color: rgba(255, 255, 255, .5)
        }
    </style>
</head>

<body>
    <canvas id="bg"></canvas>
    <canvas id="canvas"></canvas>
    <div class="hud">
        <div class="hud-card">
            <div class="hud-title">Tools</div>
            <div class="tool-row">
                <button class="tool-btn active" data-tool="star">⭐ Place Star</button>
                <button class="tool-btn" data-tool="connect">🔗 Connect</button>
                <button class="tool-btn" data-tool="erase">🗑️ Erase</button>
            </div>
            <div class="color-row" id="colors"></div>
            <input class="name-input" id="name-input" placeholder="Name your constellation..." maxlength="30">
        </div>
        <div class="hud-card">
            <div class="tool-row">
                <button class="tool-btn" id="btn-save">💾 Save</button>
                <button class="tool-btn" id="btn-clear">✕ Clear</button>
                <button class="tool-btn" id="btn-shoot">🌠 Shooting Star</button>
            </div>
        </div>
    </div>
    <div class="stats" id="stats">Stars: <strong>0</strong> · Lines: <strong>0</strong> · Constellations:
        <strong>0</strong></div>
    <div class="constellations-list" id="const-list"></div>
    <script>
        const bgCanvas = document.getElementById('bg'), bgCtx = bgCanvas.getContext('2d');
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = bgCanvas.width = canvas.width = innerWidth; H = bgCanvas.height = canvas.height = innerHeight; drawBg() }
        resize(); window.addEventListener('resize', resize);

        const STAR_COLORS = ['#fff5e0', '#ffe4a0', '#a0c8ff', '#ffa0a0', '#c0a0ff', '#a0ffc0'];
        let tool = 'star', currentColor = '#fff5e0';
        let stars = [], lines = [], constellations = [];
        let connectStart = null;
        let bgStars = [];
        let shootingStars = [];

        // Background stars
        function initBg() { bgStars = []; for (let i = 0; i < 300; i++)bgStars.push({ x: Math.random() * W, y: Math.random() * H, r: .3 + Math.random() * 1.5, twinkle: Math.random() * Math.PI * 2, speed: .5 + Math.random() * 2 }) }
        initBg();

        function drawBg() {
            bgCtx.fillStyle = '#02020a'; bgCtx.fillRect(0, 0, W, H);
            // Nebula hints
            const g1 = bgCtx.createRadialGradient(W * .3, H * .4, 0, W * .3, H * .4, 300);
            g1.addColorStop(0, 'rgba(60,20,80,.06)'); g1.addColorStop(1, 'transparent'); bgCtx.fillStyle = g1; bgCtx.fillRect(0, 0, W, H);
            const g2 = bgCtx.createRadialGradient(W * .7, H * .6, 0, W * .7, H * .6, 250);
            g2.addColorStop(0, 'rgba(20,40,80,.05)'); g2.addColorStop(1, 'transparent'); bgCtx.fillStyle = g2; bgCtx.fillRect(0, 0, W, H);
        }

        // Color dots
        const colorsEl = document.getElementById('colors');
        STAR_COLORS.forEach(c => {
            const dot = document.createElement('div'); dot.className = 'color-dot' + (c === currentColor ? ' active' : ''); dot.style.background = c;
            dot.addEventListener('click', () => { currentColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); dot.classList.add('active') });
            colorsEl.appendChild(dot);
        });

        // Tools
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); tool = btn.dataset.tool; connectStart = null;
                canvas.style.cursor = tool === 'erase' ? 'not-allowed' : 'crosshair';
            })
        });

        function findStar(x, y, threshold = 15) {
            let closest = null, minD = threshold;
            stars.forEach(s => { const d = Math.hypot(s.x - x, s.y - y); if (d < minD) { minD = d; closest = s } });
            return closest;
        }

        canvas.addEventListener('click', e => {
            const x = e.clientX, y = e.clientY;
            if (tool === 'star') {
                const star = { x, y, r: 3 + Math.random() * 3, color: currentColor, twinkle: Math.random() * Math.PI * 2, id: Date.now() + Math.random() };
                stars.push(star);
            } else if (tool === 'connect') {
                const s = findStar(x, y);
                if (s) {
                    if (!connectStart) { connectStart = s; s._highlight = true }
                    else if (s !== connectStart) {
                        const exists = lines.some(l => (l.a === connectStart && l.b === s) || (l.a === s && l.b === connectStart));
                        if (!exists) lines.push({ a: connectStart, b: s, color: currentColor });
                        connectStart._highlight = false; connectStart = null;
                    }
                }
            } else if (tool === 'erase') {
                const s = findStar(x, y, 20);
                if (s) { stars = stars.filter(st => st !== s); lines = lines.filter(l => l.a !== s && l.b !== s) }
            }
            updateStats();
        });

        // Shooting star
        document.getElementById('btn-shoot').addEventListener('click', () => {
            shootingStars.push({ x: -50, y: Math.random() * H * .5, vx: 8 + Math.random() * 6, vy: 3 + Math.random() * 3, life: 1, trail: [] });
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            const name = document.getElementById('name-input').value.trim() || 'Unnamed #' + (constellations.length + 1);
            if (stars.length === 0) return;
            constellations.push({ name, stars: [...stars], lines: [...lines] });
            document.getElementById('name-input').value = '';
            updateConstList(); updateStats();
        });

        document.getElementById('btn-clear').addEventListener('click', () => { stars = []; lines = []; connectStart = null; updateStats() });

        function updateConstList() {
            const list = document.getElementById('const-list'); list.innerHTML = '';
            constellations.forEach(c => {
                const tag = document.createElement('div'); tag.className = 'const-tag'; tag.textContent = `✦ ${c.name} (${c.stars.length}⭐)`;
                list.appendChild(tag);
            });
        }

        function updateStats() {
            document.getElementById('stats').innerHTML = `Stars: <strong>${stars.length}</strong> · Lines: <strong>${lines.length}</strong> · Constellations: <strong>${constellations.length}</strong>`;
        }

        // Render
        function draw() {
            ctx.clearRect(0, 0, W, H);
            // BG twinkle stars
            const t = performance.now() * .001;
            bgStars.forEach(s => {
                const alpha = .3 + Math.sin(t * s.speed + s.twinkle) * .3;
                ctx.fillStyle = `rgba(255,255,240,${alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
            });
            // Constellation lines
            lines.forEach(l => {
                ctx.strokeStyle = l.color + '60'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(l.a.x, l.a.y); ctx.lineTo(l.b.x, l.b.y); ctx.stroke();
                ctx.setLineDash([]);
            });
            // Stars
            stars.forEach(s => {
                const glow = .6 + Math.sin(t * 2 + s.twinkle) * .3;
                const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
                g.addColorStop(0, s.color + Math.round(glow * 99).toString(16).padStart(2, '0'));
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = s.color; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                // 4-point sparkle
                if (s.r > 4 || s._highlight) {
                    ctx.strokeStyle = s.color + '40'; ctx.lineWidth = 1;
                    const len = s.r * 3;
                    ctx.beginPath(); ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len); ctx.stroke();
                }
            });
            // Shooting stars
            shootingStars.forEach(s => {
                s.trail.push({ x: s.x, y: s.y }); if (s.trail.length > 30) s.trail.shift();
                s.x += s.vx; s.y += s.vy; s.life -= .008;
                ctx.strokeStyle = `rgba(255,255,200,${s.life * .6})`; ctx.lineWidth = 2;
                ctx.beginPath();
                s.trail.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y) });
                ctx.stroke();
                ctx.fillStyle = `rgba(255,255,220,${s.life})`; ctx.beginPath(); ctx.arc(s.x, s.y, 2, 0, Math.PI * 2); ctx.fill();
            });
            shootingStars = shootingStars.filter(s => s.life > 0 && s.x < W + 100 && s.y < H + 100);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>

</html>
